name: Build
on:
  push:
    paths:
      - '**.4dm'
  pull_request:
    paths:
      - '**.4dm'
  workflow_dispatch:

jobs:
  build:
    name: "Build"
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v3
    - name: Checkout StdIO
      uses: actions/checkout@v3
      with:
        repository: mesopelagique/StdIO
        path: Components/StdIO.4dbase
    - name: Checkout JSONRPC
      uses: actions/checkout@v3
      with:
        repository: mesopelagique/JSONRPC
        path: Components/JSONRPC.4dbase
    - name: Build
      uses: 4d/build4d-action@main
